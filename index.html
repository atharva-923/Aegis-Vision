<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aegis Vision</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DARK THEME (default) ── */
    :root, [data-theme="dark"] {
      --bg:       #08080e;
      --surface:  #101018;
      --surface2: #16161f;
      --border:   #1c1c2a;
      --text:     #e8e8f2;
      --muted:    #55556a;
      --accent:   #c8ff00;
      --danger:   #ff3b3b;
      --safe:     #00e676;
      --white:    #ffffff;
      --grid-line: rgba(200,255,0,0.025);
      --header-bg: rgba(8,8,14,0.9);
      --map-bg:    #0d0d18;
      --marker-border: #08080e;
    }

    /* ── LIGHT THEME ── */
    [data-theme="light"] {
      --bg:       #f0f2f5;
      --surface:  #ffffff;
      --surface2: #f5f6fa;
      --border:   #e0e3eb;
      --text:     #1a1a2e;
      --muted:    #7a7a9a;
      --accent:   #5c9e00;
      --danger:   #e53935;
      --safe:     #00a152;
      --white:    #1a1a2e;
      --grid-line: rgba(92,158,0,0.06);
      --header-bg: rgba(240,242,245,0.92);
      --map-bg:    #e8eaf0;
      --marker-border: #f0f2f5;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
      transition: background-image 0.3s;
    }

    /* ── THEME TOGGLE BUTTON ── */
    .theme-toggle {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--accent); transform: rotate(20deg); }

    /* ═══════════════════════════════
       LOGIN PAGE
    ═══════════════════════════════ */
    #login-page {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; position: relative;
    }

    #login-page::after {
      content: '';
      position: fixed; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,255,0,0.06) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      pointer-events: none;
    }

    [data-theme="light"] #login-page::after {
      background: radial-gradient(circle, rgba(92,158,0,0.08) 0%, transparent 70%);
    }

    .login-wrapper {
      width: 100%; max-width: 420px; padding: 1rem;
      position: relative; z-index: 1;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand { text-align: center; margin-bottom: 2.5rem; }

    .brand-logo {
      width: 52px; height: 52px; background: var(--accent);
      border-radius: 14px; display: inline-flex;
      align-items: center; justify-content: center; margin-bottom: 1rem;
      transition: background 0.3s;
    }
    .brand-logo svg { width: 28px; height: 28px; fill: var(--bg); }

    .brand h1 {
      font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800;
      letter-spacing: -0.02em; color: var(--white);
    }
    .brand p { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; font-weight: 300; }

    /* theme toggle on login page */
    .login-theme-toggle {
      position: fixed; top: 1.2rem; right: 1.2rem; z-index: 10;
    }

    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2rem;
      transition: background 0.3s, border-color 0.3s;
    }

    .tabs {
      display: flex; background: var(--bg); border-radius: 10px;
      padding: 4px; margin-bottom: 1.8rem; gap: 4px;
      transition: background 0.3s;
    }

    .tab-btn {
      flex: 1; padding: 0.55rem; border: none; background: transparent;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: var(--accent); color: var(--bg); font-weight: 700; }

    .form-section { display: none; }
    .form-section.active { display: block; }
    .form-group { margin-bottom: 1.1rem; }

    label {
      display: block; font-size: 0.8rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; font-weight: 500;
    }

    input {
      width: 100%; padding: 0.75rem 1rem; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none;
      transition: border-color 0.2s, background 0.3s, color 0.3s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%; padding: 0.85rem; background: var(--accent); color: var(--bg);
      border: none; border-radius: 10px; font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 700; letter-spacing: 0.03em;
      cursor: pointer; margin-top: 0.5rem; transition: all 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .error-msg { color: var(--danger); font-size: 0.82rem; margin-top: 0.8rem; text-align: center; display: none; }
    .error-msg.show { display: block; }
    .success-msg { color: var(--safe); font-size: 0.82rem; margin-top: 0.8rem; text-align: center; display: none; }
    .success-msg.show { display: block; }

    /* ═══════════════════════════════
       DASHBOARD PAGE
    ═══════════════════════════════ */
    #dashboard-page { display: none; flex-direction: column; min-height: 100vh; }

    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 64px;
      background: var(--header-bg); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      transition: background 0.3s, border-color 0.3s;
    }

    .brand-row { display: flex; align-items: center; gap: 0.75rem; }

    .header-logo {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      transition: background 0.3s;
    }
    .header-logo svg { width: 20px; height: 20px; fill: var(--bg); }

    .brand-name {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.15rem;
      color: var(--white); letter-spacing: -0.01em;
    }

    .header-right { display: flex; align-items: center; gap: 1rem; }

    .live-badge {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.75rem; color: var(--safe); font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    .live-dot {
      width: 8px; height: 8px; background: var(--safe); border-radius: 50%;
      animation: livepulse 1.5s infinite;
    }

    @keyframes livepulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    .profile-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 0.85rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      position: relative; font-family: 'Syne', sans-serif; transition: border-color 0.2s;
    }
    .profile-btn:hover { border-color: var(--accent); }

    .profile-dropdown {
      position: absolute; top: calc(100% + 10px); right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; min-width: 180px; padding: 0.5rem;
      display: none; z-index: 100;
      transition: background 0.3s;
    }
    .profile-dropdown.show { display: block; }

    .profile-email {
      padding: 0.5rem 0.75rem; font-size: 0.78rem; color: var(--muted);
      border-bottom: 1px solid var(--border); margin-bottom: 0.3rem; word-break: break-all;
    }

    .dropdown-item {
      display: block; width: 100%; padding: 0.55rem 0.75rem;
      background: none; border: none; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
      text-align: left; cursor: pointer; border-radius: 8px; transition: background 0.15s;
    }
    .dropdown-item:hover { background: var(--surface2); }
    .dropdown-item.danger { color: var(--danger); }

    main {
      flex: 1; position: relative; z-index: 1;
      display: grid; grid-template-columns: 1fr 380px; grid-template-rows: auto 1fr;
      gap: 1.25rem; padding: 1.5rem 2rem 2rem;
      max-width: 1400px; width: 100%; margin: 0 auto;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 1.5rem; position: relative; overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }

    .card-title {
      font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted);
      margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .card-title-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    .map-card { grid-row: 1 / 3; }

    #map {
      width: 100%; height: 420px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--map-bg);
      transition: border-color 0.3s;
    }

    .gps-coords { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 1rem; }

    .coord-box {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.75rem 1rem;
      transition: background 0.3s, border-color 0.3s;
    }
    .coord-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.3rem; }
    .coord-value { font-family: 'DM Mono', monospace; font-size: 1rem; color: var(--accent); font-weight: 500; }

    .history-list {
      margin-top: 1rem; max-height: 200px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }

    .history-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 0; border-bottom: 1px solid var(--border); animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }
    .history-item:last-child { border-bottom: none; }
    .history-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .history-coords { flex: 1; font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--text); }
    .history-time { font-size: 0.72rem; color: var(--muted); }

    .empty-state { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.85rem; }

    .distance-display { text-align: center; padding: 1.5rem 0 1rem; }
    .distance-number {
      font-family: 'Syne', sans-serif; font-size: 5rem; font-weight: 800;
      line-height: 1; transition: color 0.4s ease; letter-spacing: -0.04em;
    }
    .distance-unit { font-size: 1.2rem; color: var(--muted); font-weight: 400; margin-top: 0.25rem; }
    .last-update { text-align: center; font-size: 0.75rem; color: var(--muted); margin-top: 0.5rem; font-family: 'DM Mono', monospace; }

    .status-indicator { display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 1.5rem 0; }

    .status-ring {
      width: 120px; height: 120px; border-radius: 50%; border: 4px solid currentColor;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      transition: color 0.4s ease, box-shadow 0.4s ease;
    }
    .status-ring.safe   { color: var(--safe);   box-shadow: 0 0 40px rgba(0,230,118,0.2); }
    .status-ring.danger { color: var(--danger);  box-shadow: 0 0 40px rgba(255,59,59,0.25); animation: shake 0.3s ease infinite; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-2px); }
      75% { transform: translateX(2px); }
    }

    .status-icon { font-size: 2rem; line-height: 1; }
    .status-text {
      font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800;
      letter-spacing: 0.1em; transition: color 0.4s ease;
    }
    .status-text.safe   { color: var(--safe); }
    .status-text.danger { color: var(--danger); }
    .status-desc { font-size: 0.82rem; color: var(--muted); text-align: center; max-width: 200px; line-height: 1.5; }
  </style>
</head>
<body>

  <!-- ═══════════ LOGIN PAGE ═══════════ -->
  <div id="login-page">
    <!-- theme toggle top right on login -->
    <div class="login-theme-toggle">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="loginThemeBtn">🌙</button>
    </div>

    <div class="login-wrapper">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </div>
        <h1>Aegis Vision</h1>
        <p>Smart Assistive Goggles Dashboard</p>
      </div>

      <div class="login-card">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('login')">Login</button>
          <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div id="loginForm" class="form-section active">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" />
          </div>
          <button class="btn-primary" id="loginBtn" onclick="doLogin()">Login</button>
          <div class="error-msg" id="loginError"></div>
        </div>

        <div id="signupForm" class="form-section">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="signupEmail" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Min 6 characters" />
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat password" />
          </div>
          <button class="btn-primary" id="signupBtn" onclick="doSignup()">Create Account</button>
          <div class="error-msg" id="signupError"></div>
          <div class="success-msg" id="signupSuccess"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════ DASHBOARD PAGE ═══════════ -->
  <div id="dashboard-page" style="display:none; flex-direction:column; min-height:100vh;">
    <header>
      <div class="brand-row">
        <div class="header-logo">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </div>
        <span class="brand-name">Aegis Vision</span>
      </div>
      <div class="header-right">
        <div class="live-badge"><div class="live-dot"></div> Live</div>
        <!-- Theme toggle in header -->
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="dashThemeBtn">🌙</button>
        <div class="profile-btn" id="profileBtn" onclick="toggleDropdown()">
          <span id="profileInitial">?</span>
          <div class="profile-dropdown" id="profileDropdown">
            <div class="profile-email" id="profileEmail"></div>
            <button class="dropdown-item danger" onclick="doLogout()">⎋ Logout</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="card map-card">
        <div class="card-title"><div class="card-title-dot"></div> GPS Location & History</div>
        <div id="map"></div>
        <div class="gps-coords">
          <div class="coord-box">
            <div class="coord-label">Latitude</div>
            <div class="coord-value" id="latVal">—</div>
          </div>
          <div class="coord-box">
            <div class="coord-label">Longitude</div>
            <div class="coord-value" id="lngVal">—</div>
          </div>
        </div>
        <div class="card-title" style="margin-top:1.5rem"><div class="card-title-dot"></div> Movement History</div>
        <div class="history-list" id="historyList">
          <div class="empty-state">No GPS data yet. Waiting for device...</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><div class="card-title-dot"></div> Obstacle Distance</div>
        <div class="distance-display">
          <div class="distance-number" id="distanceNumber">—</div>
          <div class="distance-unit">centimeters</div>
        </div>
        <div class="last-update" id="distanceTime">Awaiting data...</div>
      </div>

      <div class="card">
        <div class="card-title"><div class="card-title-dot"></div> Safety Status</div>
        <div class="status-indicator">
          <div class="status-ring safe" id="statusRing">
            <span class="status-icon" id="statusIcon">✓</span>
          </div>
          <div class="status-text safe" id="statusText">SAFE</div>
          <div class="status-desc" id="statusDesc">No obstacle detected within 50 cm range.</div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, query, limit, getDocs }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getDatabase, ref, onValue }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAJAXoGhjP10mZIQfkrlqYKI9EtzJcYg6w",
      authDomain:        "aegis-vision-d193f.firebaseapp.com",
      projectId:         "aegis-vision-d193f",
      storageBucket:     "aegis-vision-d193f.firebasestorage.app",
      messagingSenderId: "182017855924",
      appId:             "1:182017855924:web:a3414113eff5f3bad5a2e1",
      databaseURL:       "https://aegis-vision-d193f-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const rtdb = getDatabase(app);

    // ── MAP INIT ──
    const map = L.map('map', { zoomControl: true }).setView([20.5937, 78.9629], 5);

    let tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(map);

    const markerIcon = L.divIcon({
      className: '',
      html: `<div id="mapMarkerDiv" style="width:18px;height:18px;background:#c8ff00;border-radius:50%;
             border:3px solid #08080e;box-shadow:0 0 14px rgba(200,255,0,0.6);"></div>`,
      iconSize: [18,18], iconAnchor: [9,9]
    });

    let marker   = null;
    let polyline = L.polyline([], { color: '#c8ff00', weight: 2, opacity: 0.5 }).addTo(map);

    // ── EXPOSE MAP TILE SWAP to window (called by toggleTheme) ──
    window.swapMapTiles = function(isDark) {
      map.removeLayer(tileLayer);
      const url = isDark
        ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
        : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
      tileLayer = L.tileLayer(url, {
        attribution: '© OpenStreetMap contributors © CARTO',
        subdomains: 'abcd', maxZoom: 19
      }).addTo(map);
    };

    // ── AUTH STATE ──
    onAuthStateChanged(auth, user => {
      if (user) showDashboard(user);
      else showLogin();
    });

    function showLogin() {
      document.getElementById('login-page').style.display     = 'flex';
      document.getElementById('dashboard-page').style.display = 'none';
    }

    function showDashboard(user) {
      document.getElementById('login-page').style.display     = 'none';
      document.getElementById('dashboard-page').style.display = 'flex';
      document.getElementById('profileEmail').textContent     = user.email;
      document.getElementById('profileInitial').textContent   = user.email[0].toUpperCase();
      setTimeout(() => map.invalidateSize(), 100);

      const distRef = ref(rtdb, '/aegis/live/distance');
      onValue(distRef, snap => {
        const d = snap.val();
        if (d !== null && d !== undefined) updateDistance(d);
      });

      const gpsRef = ref(rtdb, '/aegis/live');
      onValue(gpsRef, snap => {
        const d = snap.val();
        if (d && d.lat && d.lng && d.lat !== 0 && d.lng !== 0) updateGPS(d.lat, d.lng);
      });

      fetchGPS();
      setInterval(fetchGPS, 5000);
    }

    window.doLogin = async () => {
      const btn   = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      const email = document.getElementById('loginEmail').value;
      const pass  = document.getElementById('loginPassword').value;
      errEl.classList.remove('show');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch(e) {
        errEl.textContent = friendlyError(e.code);
        errEl.classList.add('show');
        btn.disabled = false; btn.textContent = 'Login';
      }
    };

    window.doSignup = async () => {
      const btn    = document.getElementById('signupBtn');
      const errEl  = document.getElementById('signupError');
      const succEl = document.getElementById('signupSuccess');
      const email  = document.getElementById('signupEmail').value;
      const pass   = document.getElementById('signupPassword').value;
      const conf   = document.getElementById('confirmPassword').value;
      errEl.classList.remove('show'); succEl.classList.remove('show');
      if (pass !== conf) { errEl.textContent = 'Passwords do not match.'; errEl.classList.add('show'); return; }
      if (pass.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.classList.add('show'); return; }
      btn.disabled = true; btn.textContent = 'Creating...';
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
        succEl.textContent = 'Account created! Loading dashboard...';
        succEl.classList.add('show');
      } catch(e) {
        errEl.textContent = friendlyError(e.code);
        errEl.classList.add('show');
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    };

    window.doLogout = async () => { await signOut(auth); };

    function friendlyError(code) {
      const m = {
        'auth/user-not-found':        'No account found with this email.',
        'auth/wrong-password':        'Incorrect password.',
        'auth/email-already-in-use':  'Email is already registered.',
        'auth/invalid-email':         'Please enter a valid email.',
        'auth/invalid-credential':    'Invalid credentials. Check email/password.',
        'auth/network-request-failed':'Network error. Check your connection.',
      };
      return m[code] || 'Something went wrong. Please try again.';
    }

    async function fetchGPS() {
      try {
        const snap = await getDocs(query(collection(db, 'sensorData'), limit(20)));
        const docs = [];
        snap.forEach(d => docs.push({ id: d.id, ...d.data() }));
        if (docs.length === 0) return;
        docs.sort((a, b) => b.id.localeCompare(a.id));
        const gpsOnly = docs.filter(d => d.lat && d.lng && d.lat !== 0 && d.lng !== 0).slice(0, 10).reverse();
        updateHistory(gpsOnly);
        polyline.setLatLngs(gpsOnly.map(d => [d.lat, d.lng]));
      } catch(e) { console.error('GPS history fetch error:', e); }
    }

    function updateDistance(cm) {
      const rounded  = Math.round(cm);
      const isDanger = cm < 50;
      document.getElementById('distanceNumber').textContent = rounded;
      document.getElementById('distanceNumber').style.color = isDanger ? 'var(--danger)' : 'var(--safe)';
      document.getElementById('statusRing').className       = 'status-ring ' + (isDanger ? 'danger' : 'safe');
      document.getElementById('statusText').className       = 'status-text ' + (isDanger ? 'danger' : 'safe');
      document.getElementById('statusText').textContent     = isDanger ? 'DANGER' : 'SAFE';
      document.getElementById('statusIcon').textContent     = isDanger ? '⚠' : '✓';
      document.getElementById('statusDesc').textContent     = isDanger
        ? `Obstacle at ${rounded} cm — move away immediately!`
        : `Clear path. Nearest obstacle at ${rounded} cm.`;
      document.getElementById('distanceTime').textContent   = 'Last updated: ' + new Date().toLocaleTimeString();
    }

    function updateGPS(lat, lng) {
      document.getElementById('latVal').textContent = lat.toFixed(6);
      document.getElementById('lngVal').textContent = lng.toFixed(6);
      if (marker) marker.setLatLng([lat, lng]);
      else marker = L.marker([lat, lng], { icon: markerIcon }).addTo(map);
      map.setView([lat, lng], 16);
    }

    function updateHistory(gpsOnly) {
      const el = document.getElementById('historyList');
      if (gpsOnly.length === 0) return;
      el.innerHTML = [...gpsOnly].reverse().map(d => `
        <div class="history-item">
          <div class="history-dot"></div>
          <div class="history-coords">${d.lat.toFixed(5)}, ${d.lng.toFixed(5)}</div>
          <div class="history-time">${new Date().toLocaleTimeString()}</div>
        </div>`).join('');
    }
  </script>

  <script>
    // ── THEME TOGGLE ──
    let isDark = true;

    function toggleTheme() {
      isDark = !isDark;
      const theme = isDark ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('aegis-theme', theme);

      // Update both toggle buttons
      const icon = isDark ? '🌙' : '☀️';
      document.getElementById('loginThemeBtn').textContent = icon;
      document.getElementById('dashThemeBtn').textContent  = icon;

      // Swap map tiles
      if (typeof window.swapMapTiles === 'function') {
        window.swapMapTiles(isDark);
      }
    }

    // Load saved theme on page load
    (function() {
      const saved = localStorage.getItem('aegis-theme') || 'dark';
      isDark = saved === 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      const icon = isDark ? '🌙' : '☀️';
      document.getElementById('loginThemeBtn').textContent = icon;
      document.getElementById('dashThemeBtn').textContent  = icon;
    })();

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b,i) => {
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
      });
      document.getElementById('loginForm').classList.toggle('active', tab === 'login');
      document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
    }

    function toggleDropdown() {
      document.getElementById('profileDropdown').classList.toggle('show');
    }

    document.addEventListener('click', e => {
      const btn = document.getElementById('profileBtn');
      if (btn && !btn.contains(e.target)) {
        document.getElementById('profileDropdown').classList.remove('show');
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('loginForm').classList.contains('active')) doLogin();
        else doSignup();
      }
    });
  </script>
</body>
</html>
